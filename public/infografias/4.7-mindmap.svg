<svg id="administrative-mindmap" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="centralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
        </linearGradient>
    </defs>

    <g class="mindmap-links">
        <path class="mindmap-link" d="M300,300 L150,150" />
        <path class="mindmap-link" d="M300,300 L450,150" />
        <path class="mindmap-link" d="M300,300 L150,300" />
        <path class="mindmap-link" d="M300,300 L450,300" />
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ETAPAS</text>
        <text x="150" y="145" text-anchor="middle" fill="white" font-size="9">Ejecución</text>
        <text x="150" y="160" text-anchor="middle" fill="white" font-size="8">(Construcción)</text>
        <text x="150" y="180" text-anchor="middle" fill="white" font-size="9">Operación</text>
        <text x="150" y="195" text-anchor="middle" fill="white" font-size="8">(Producción)</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ESTRUCTURAS</text>
        <text x="150" y="145" text-anchor="middle" fill="white" font-size="9">Funcional</text>
        <text x="450" y="160" text-anchor="middle" fill="white" font-size="9">Plana / Horizontal</text>
        <text x="450" y="180" text-anchor="middle" fill="white" font-size="9">Matricial</text>
        <text x="450" y="195" text-anchor="middle" fill="white" font-size="9">Divisional</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="275" text-anchor="middle" fill="white" font-size="11" font-weight="bold">RECURSOS</text>
        <text x="150" y="295" text-anchor="middle" fill="white" font-size="9">Humanos</text>
        <text x="150" y="310" text-anchor="middle" fill="white" font-size="8">(Perfiles)</text>
        <text x="150" y="330" text-anchor="middle" fill="white" font-size="9">Materiales / Tech</text>
        <text x="150" y="345" text-anchor="middle" fill="white" font-size="9">Financieros</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="275" text-anchor="middle" fill="white" font-size="11" font-weight="bold">NORMATIVA</text>
        <text x="450" y="295" text-anchor="middle" fill="white" font-size="9">MOF</text>
        <text x="450" y="310" text-anchor="middle" fill="white" font-size="8">(Manual Organizacional)</text>
        <text x="450" y="330" text-anchor="middle" fill="white" font-size="9">Manual de Procedimientos</text>
        <text x="450" y="345" text-anchor="middle" fill="white" font-size="9">Salud y Seguridad</text>
    </g>
    
    <g class="mindmap-node">
        <circle cx="300" cy="300" r="75" fill="url(#centralGradient)" />
        <text x="300" y="285" text-anchor="middle" fill="white" font-size="14" font-weight="bold">ESTUDIO</text>
        <text x="300" y="300" text-anchor="middle" fill="white" font-size="14" font-weight="bold">ADMINISTRATIVO</text>
        <text x="300" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DE</text>
        <text x="300" y="330" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PROYECTOS</text>
    </g>

    <style>
        .mindmap-node {
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .mindmap-node:hover {
            transform: scale(1.08);
            filter: brightness(1.2) url(#dropshadow);
        }
        .mindmap-link {
            stroke: #6366f1;
            stroke-width: 3;
            fill: none;
            opacity: 0.7;
            stroke-linecap: round;
        }
        .dark .mindmap-link {
            stroke: #93c5fd;
            opacity: 0.8;
        }
    </style>
</svg>
