<svg id="strategic-mindmap" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="centralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3730a3;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
        </linearGradient>
    </defs>

    <g class="mindmap-links">
        <path class="mindmap-link" d="M300,300 L150,150" />
        <path class="mindmap-link" d="M300,300 L450,150" />
        <path class="mindmap-link" d="M300,300 L150,450" />
        <path class="mindmap-link" d="M300,300 L450,450" />
        <path class="mindmap-link" d="M300,300 L300,100" />
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <circle cx="300" cy="100" r="45" fill="url(#nodeGradient)" />
        <text x="300" y="95" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Visión y</text>
        <text x="300" y="110" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Misión</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Análisis Externo</text>
        <text x="150" y="145" text-anchor="middle" fill="white" font-size="9">(Oportunidades y</text>
        <text x="150" y="160" text-anchor="middle" fill="white" font-size="9">Amenazas - PESTEL)</text>
        <text x="150" y="175" text-anchor="middle" fill="white" font-size="9">Análisis del entorno</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Análisis Interno</text>
        <text x="450" y="145" text-anchor="middle" fill="white" font-size="9">(Fortalezas y</text>
        <text x="450" y="160" text-anchor="middle" fill="white" font-size="9">Debilidades - FODA)</text>
        <text x="450" y="175" text-anchor="middle" fill="white" font-size="9">Recursos y capacidades</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="400" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="425" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Implementación</text>
        <text x="150" y="445" text-anchor="middle" fill="white" font-size="9">(Objetivos anuales,</text>
        <text x="150" y="460" text-anchor="middle" fill="white" font-size="9">Políticas, Recursos)</text>
        <text x="150" y="475" text-anchor="middle" fill="white" font-size="9">Ejecución estratégica</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="400" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="425" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Evaluación</text>
        <text x="450" y="445" text-anchor="middle" fill="white" font-size="9">(Revisión factores,</text>
        <text x="450" y="460" text-anchor="middle" fill="white" font-size="9">Medir desempeño)</text>
        <text x="450" y="475" text-anchor="middle" fill="white" font-size="9">Control y ajuste</text>
    </g>
    
    <g class="mindmap-node">
        <circle cx="300" cy="300" r="75" fill="url(#centralGradient)" />
        <text x="300" y="290" text-anchor="middle" fill="white" font-size="15" font-weight="bold">ADMINISTRACIÓN</text>
        <text x="300" y="310" text-anchor="middle" fill="white" font-size="15" font-weight="bold">ESTRATÉGICA</text>
        <text x="300" y="325" text-anchor="middle" fill="white" font-size="9">por Casos</text>
    </g>

    <style>
        .mindmap-node {
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .mindmap-node:hover {
            transform: scale(1.08);
            filter: brightness(1.2) url(#dropshadow);
        }
        .mindmap-link {
            stroke: #6366f1;
            stroke-width: 3;
            fill: none;
            opacity: 0.7;
            stroke-linecap: round;
        }
        .dark .mindmap-link {
            stroke: #93c5fd;
            opacity: 0.8;
        }
    </style>
</svg>
