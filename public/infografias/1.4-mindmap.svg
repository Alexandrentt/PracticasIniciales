<svg id="planning-mindmap" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="centralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
        </linearGradient>
    </defs>

    <g class="mindmap-links">
        <path class="mindmap-link" d="M300,300 L150,150" />
        <path class="mindmap-link" d="M300,300 L450,150" />
        <path class="mindmap-link" d="M300,300 L150,300" />
        <path class="mindmap-link" d="M300,300 L450,300" />
        <path class="mindmap-link" d="M300,300 L300,450" />
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PLANIFICACIÓN</text>
        <text x="150" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="bold">ESTRATÉGICA</text>
        <text x="150" y="160" text-anchor="middle" fill="white" font-size="9">Objetivos a largo plazo</text>
        <text x="150" y="175" text-anchor="middle" fill="white" font-size="9">Visión del proyecto</text>
        <text x="150" y="190" text-anchor="middle" fill="white" font-size="9">Nivel organizacional</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="100" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="125" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PLANIFICACIÓN</text>
        <text x="450" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="bold">TÁCTICA</text>
        <text x="450" y="160" text-anchor="middle" fill="white" font-size="9">Planes específicos</text>
        <text x="450" y="175" text-anchor="middle" fill="white" font-size="9">Por departamentos</text>
        <text x="450" y="190" text-anchor="middle" fill="white" font-size="9">Acciones concretas</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="275" text-anchor="middle" fill="white" font-size="11" font-weight="bold">PLANIFICACIÓN</text>
        <text x="150" y="290" text-anchor="middle" fill="white" font-size="11" font-weight="bold">OPERATIVA</text>
        <text x="150" y="310" text-anchor="middle" fill="white" font-size="9">Calendarios detallados</text>
        <text x="150" y="325" text-anchor="middle" fill="white" font-size="9">Asignación diaria</text>
        <text x="150" y="340" text-anchor="middle" fill="white" font-size="9">Recursos inmediatos</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="275" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CICLO DE</text>
        <text x="450" y="290" text-anchor="middle" fill="white" font-size="11" font-weight="bold">VIDA</text>
        <text x="450" y="310" text-anchor="middle" fill="white" font-size="9">Inicio</text>
        <text x="450" y="325" text-anchor="middle" fill="white" font-size="9">Planificación</text>
        <text x="450" y="340" text-anchor="middle" fill="white" font-size="9">Ejecución</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="225" y="400" width="150" height="80" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="300" y="420" text-anchor="middle" fill="white" font-size="11" font-weight="bold">CICLO DE</text>
        <text x="300" y="435" text-anchor="middle" fill="white" font-size="11" font-weight="bold">VIDA (cont.)</text>
        <text x="300" y="455" text-anchor="middle" fill="white" font-size="9">Control</text>
        <text x="300" y="470" text-anchor="middle" fill="white" font-size="9">Cierre</text>
    </g>
    
    <g class="mindmap-node">
        <circle cx="300" cy="300" r="75" fill="url(#centralGradient)" />
        <text x="300" y="285" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PLANIFICACIÓN</text>
        <text x="300" y="300" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Y</text>
        <text x="300" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="bold">CICLOS</text>
        <text x="300" y="330" text-anchor="middle" fill="white" font-size="14" font-weight="bold">DE VIDA</text>
    </g>

    <style>
        .mindmap-node {
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .mindmap-node:hover {
            transform: scale(1.08);
            filter: brightness(1.2) url(#dropshadow);
        }
        .mindmap-link {
            stroke: #6366f1;
            stroke-width: 3;
            fill: none;
            opacity: 0.7;
            stroke-linecap: round;
        }
        .dark .mindmap-link {
            stroke: #93c5fd;
            opacity: 0.8;
        }
    </style>
</svg>
