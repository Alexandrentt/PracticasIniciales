<svg id="comparative-mindmap" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="dropshadow" height="130%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="centralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="nodeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
        </linearGradient>
    </defs>

    <g class="mindmap-links">
        <path class="mindmap-link" d="M300,300 L150,150" />
        <path class="mindmap-link" d="M300,300 L450,150" />
        <path class="mindmap-link" d="M300,300 L150,300" />
        <path class="mindmap-link" d="M300,300 L450,300" />
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="100" width="150" height="120" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Materiales y</text>
        <text x="150" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Estructuras</text>
        <text x="150" y="155" text-anchor="middle" fill="white" font-size="9">Edificaciones:</text>
        <text x="150" y="170" text-anchor="middle" fill="white" font-size="8">Acero vs Concreto</text>
        <text x="150" y="185" text-anchor="middle" fill="white" font-size="9">Estabilidad:</text>
        <text x="150" y="200" text-anchor="middle" fill="white" font-size="8">Hormigón vs Geosintéticos</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="100" width="150" height="120" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="120" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Metodologías</text>
        <text x="450" y="135" text-anchor="middle" fill="white" font-size="11" font-weight="bold">de Gestión</text>
        <text x="450" y="155" text-anchor="middle" fill="white" font-size="9">Tradicionales:</text>
        <text x="450" y="170" text-anchor="middle" fill="white" font-size="8">PMBOK, PMI</text>
        <text x="450" y="185" text-anchor="middle" fill="white" font-size="9">Ágiles:</text>
        <text x="450" y="200" text-anchor="middle" fill="white" font-size="8">Scrum, Kanban</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="75" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="150" y="270" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Dirección y</text>
        <text x="150" y="285" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Liderazgo</text>
        <text x="150" y="305" text-anchor="middle" fill="white" font-size="9">Con PM:</text>
        <text x="150" y="320" text-anchor="middle" fill="white" font-size="8">Centralización, control</text>
        <text x="150" y="335" text-anchor="middle" fill="white" font-size="9">Sin PM:</text>
        <text x="150" y="350" text-anchor="middle" fill="white" font-size="8">Riesgo de dispersión</text>
    </g>

    <g class="mindmap-node" filter="url(#dropshadow)">
        <rect x="375" y="250" width="150" height="100" rx="12" ry="12" fill="url(#nodeGradient)" />
        <text x="450" y="270" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Herramientas</text>
        <text x="450" y="285" text-anchor="middle" fill="white" font-size="11" font-weight="bold">Tecnológicas</text>
        <text x="450" y="305" text-anchor="middle" fill="white" font-size="9">Gestión:</text>
        <text x="450" y="320" text-anchor="middle" fill="white" font-size="8">Gratis vs Pago</text>
        <text x="450" y="335" text-anchor="middle" fill="white" font-size="9">Diseño:</text>
        <text x="450" y="350" text-anchor="middle" fill="white" font-size="8">AutoCAD vs Libre</text>
    </g>
    
    <g class="mindmap-node">
        <circle cx="300" cy="300" r="75" fill="url(#centralGradient)" />
        <text x="300" y="285" text-anchor="middle" fill="white" font-size="14" font-weight="bold">ESTUDIOS</text>
        <text x="300" y="300" text-anchor="middle" fill="white" font-size="14" font-weight="bold">COMPARATIVOS</text>
        <text x="300" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="bold">EN</text>
        <text x="300" y="330" text-anchor="middle" fill="white" font-size="14" font-weight="bold">PROYECTOS</text>
    </g>

    <style>
        .mindmap-node {
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
        .mindmap-node:hover {
            transform: scale(1.08);
            filter: brightness(1.2) url(#dropshadow);
        }
        .mindmap-link {
            stroke: #6366f1;
            stroke-width: 3;
            fill: none;
            opacity: 0.7;
            stroke-linecap: round;
        }
        .dark .mindmap-link {
            stroke: #93c5fd;
            opacity: 0.8;
        }
    </style>
</svg>
